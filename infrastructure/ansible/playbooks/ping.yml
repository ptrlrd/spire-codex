---
# Quick connectivity smoke test. SSH'es to every host, runs the ping
# module, reports success/failure. Good first thing to run after
# editing inventory or rotating keys.
#
#   ./bin/op-ansible playbooks/ping.yml

- name: Ping every prod host (app + db)
  hosts: prod_origins:db_origins
  gather_facts: false
  tasks:
    - name: Ping
      ping:
