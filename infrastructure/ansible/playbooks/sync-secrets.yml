---
# Pull secrets from 1Password, render the .env template locally, and
# push the resolved file to every prod origin. Run after rotating a
# secret in 1Password or after adding a new env var to .env.tpl.
#
# Prereqs:
#   - 1Password CLI installed: `brew install --cask 1password-cli`
#   - Signed in: `op signin` (or biometric unlock enabled)
#
# Usage:
#   ansible-playbook playbooks/sync-secrets.yml
#
# The rendered .env is written to /tmp on your Mac for the duration of
# the push and removed immediately after — never committed, never
# stored long-term on disk.

- name: Render .env from 1Password and push to prod origins
  hosts: prod_origins
  gather_facts: false

  tasks:
    # Freeze the scratch path ONCE per host so the op-inject render
    # target and the downstream copy task reference the same filename.
    # Putting the lookup directly in `vars:` causes per-task
    # re-evaluation — the render writes to one path, the copy looks at
    # another, and you get a confusing "file not found on controller".
    - name: Compute per-host scratch path (stable across tasks)
      set_fact:
        local_rendered_env: "/tmp/spire-codex-env.{{ lookup('pipe','echo $$') }}.{{ inventory_hostname }}"

    - name: Confirm `op` CLI is installed on the local machine
      delegate_to: localhost
      become: false
      run_once: true
      command: op --version
      changed_when: false
      register: op_version

    - name: Confirm 1Password session is active (vault list works)
      delegate_to: localhost
      become: false
      run_once: true
      command: op vault list
      changed_when: false
      register: op_session
      failed_when: op_session.rc != 0
      no_log: true

    - name: Render .env via `op inject` (resolves op:// references)
      delegate_to: localhost
      become: false
      command: op inject --in-file "{{ env_template_path }}" --out-file "{{ local_rendered_env }}" --force
      changed_when: false
      no_log: true

    - name: Push rendered .env to remote host (mode 0600, root-owned)
      become: true
      copy:
        src: "{{ local_rendered_env }}"
        dest: "{{ remote_env_path }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
      no_log: true
      notify: recreate backend

    - name: Wipe local rendered .env immediately
      delegate_to: localhost
      become: false
      file:
        path: "{{ local_rendered_env }}"
        state: absent
      changed_when: false

  handlers:
    - name: recreate backend
      become: true
      command: docker compose -f {{ compose_file }} up -d --force-recreate {{ backend_service }}
      args:
        chdir: "{{ spire_codex_dir }}"
