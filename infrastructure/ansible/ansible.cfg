[defaults]
inventory = inventory.yml
host_key_checking = False
# YAML-formatted output. Modern equivalent of the removed
# community.general.yaml callback plugin.
stdout_callback = default
deprecation_warnings=False
result_format = yaml
# SSH key path is read from $SPIRE_SSH_KEY so we don't leak the
# provider/region in the filename via git. Set it in your shell
# (~/.zshrc or ~/.bashrc) or just-in-time before running playbooks:
#
#   export SPIRE_SSH_KEY=~/.ssh/spire-codex-deploy
#   ansible-playbook playbooks/verify.yml
#
# Falls back to a generic path. If your key lives elsewhere, set the
# env var rather than editing this file.
private_key_file = ${SPIRE_SSH_KEY}
# NOTE: `remote_user` is intentionally NOT set here. The wrapper
# `bin/op-ansible` fetches the username from 1Password and passes it
# via `-u <user>` (ansible's CLI flag wins over everything). Setting
# it here as `${SPIRE_REMOTE_USER}` causes silent literal substitution
# when the env var is unset — SSH works (your ~/.ssh/config defaults
# kick in) but `{{ ansible_user }}` in playbooks becomes the literal
# string `${SPIRE_REMOTE_USER}`, blowing up downstream `chown` tasks.
retry_files_enabled = False
forks = 5

[ssh_connection]
pipelining = True
# Persist the multiplexed SSH socket for 10 minutes after the last task,
# so back-to-back playbook runs reuse one connection instead of opening
# fresh ones. AWS Lightsail rate-limits port 22 against patterns that
# look like brute force, and we kept tripping it during iteration with
# the default 60s persist window.
control_path_dir = ~/.ansible/cp
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o StrictHostKeyChecking=accept-new
