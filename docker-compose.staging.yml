name: spire-codex-staging

services:
  backend:
    image: ptrlrd/spire-codex-backend:staging
    container_name: spire-codex-staging-backend
    volumes:
      - ./data:/data
      - ./.secrets:/secrets:ro
    environment:
      - DATA_DIR=/data
      - MONGO_URL=${MONGO_URL:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - FEEDBACK_WEBHOOK_URL=${FEEDBACK_WEBHOOK_URL:-}
      - GUIDE_WEBHOOK_URL=${GUIDE_WEBHOOK_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:-}
      - GITHUB_APP_REPO=${GITHUB_APP_REPO:-}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/secrets/knowledge-demon.private-key.pem}
      - SPIRE_CODEX_PUBLIC_BASE=https://staging.spire-codex.com
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: ptrlrd/spire-codex-frontend:staging
    container_name: spire-codex-staging-frontend
    depends_on:
      - backend
    volumes:
      - ./data:/data:ro
    environment:
      - API_INTERNAL_URL=http://spire-codex-staging-backend:8000
      - NEXT_PUBLIC_SITE_URL=https://staging.spire-codex.com
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  nginx_web-network:
    external: true
