name: spire-codex

services:
  backend:
    image: ptrlrd/spire-codex-backend:latest
    container_name: spire-codex-backend
    # Multiple workers so a burst of POST /api/runs (Overwolf launch
    # backfills) doesn't serialise behind a single thread and block
    # everything else (GET /api/runs/stats, /api/runs/list etc.).
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    volumes:
      - ./data:/data
      - ./.secrets:/secrets:ro
    environment:
      - DATA_DIR=/data
      - FEEDBACK_WEBHOOK_URL=${FEEDBACK_WEBHOOK_URL:-}
      - GUIDE_WEBHOOK_URL=${GUIDE_WEBHOOK_URL:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - UNINSTALL_FROM=${UNINSTALL_FROM:-}
      - UNINSTALL_FEEDBACK_TO=${UNINSTALL_FEEDBACK_TO:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:-}
      - GITHUB_APP_REPO=${GITHUB_APP_REPO:-}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/secrets/knowledge-demon.private-key.pem}
      # Card-render QA mount. Set to /data/qa once the rendered PNGs +
      # index.html are rsync'd onto the host volume. Empty/missing →
      # the /qa endpoint isn't registered.
      - QA_DIR=${QA_DIR:-}
      # Turso (libSQL) — rolled back after Overwolf launch surfaced
      # multi-second tail latency on POST /api/runs (network round-trip
      # per write was untenable under burst). Hardcoded empty so
      # _using_turso() returns False and runs_db.py uses the local
      # /data/runs.db SQLite path. .env still has the op:// refs
      # populated in case we want to flip back later.
      - TURSO_URL=
      - TURSO_AUTH_TOKEN=
      - TURSO_LOCAL_REPLICA=
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: ptrlrd/spire-codex-frontend:latest
    container_name: spire-codex-frontend
    depends_on:
      - backend
    volumes:
      - ./data:/data:ro
    environment:
      - API_INTERNAL_URL=http://spire-codex-backend:8000
      - NEXT_PUBLIC_SITE_URL=https://spire-codex.com
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  nginx_web-network:
    external: true
