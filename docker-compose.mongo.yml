name: spire-codex-mongo

# MongoDB on the secondary box. Single-node replica set so we can use
# transactions + we can grow to 3 nodes later without re-bootstrapping.
#
# Uses host networking so Mongo sees the host's public IP as one of
# its own — required for the replica-set member host to be the public
# IP (clients connect to that IP, and Mongo verifies the rs config
# matches one of its own bound addresses). Bridge networking made
# Mongo think it was only `localhost` + `172.x` from inside the
# container, and `rs.reconfig` rejected the public IP as not-mine.
#
# Lightsail firewall (port 27017 → primary's IP only) is what actually
# gates access — the container's lack of port isolation doesn't matter.

services:
  mongo:
    image: mongo:7.0
    container_name: spire-codex-mongo
    restart: unless-stopped
    network_mode: host
    command:
      - "--replSet"
      - "spire-rs"
      - "--bind_ip_all"
      - "--auth"
      - "--keyFile"
      - "/etc/mongo/keyfile"
      - "--wiredTigerCacheSizeGB"
      - "4"
    volumes:
      - ./mongo-data:/data/db
      - ./mongo-keyfile:/etc/mongo/keyfile:ro
    environment:
      # First-run only — these create the admin user before --auth
      # kicks in. After the first init, ignored.
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ADMIN_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ADMIN_PASS}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD
        - mongosh
        - "--quiet"
        - "--eval"
        - "db.adminCommand('ping')"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
