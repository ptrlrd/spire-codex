name: spire-codex-beta

services:
  backend:
    image: ptrlrd/spire-codex-backend:beta
    container_name: spire-codex-beta-backend
    volumes:
      - ./data-beta:/data
      # Mechanics prose isn't versioned by game build — overlay the
      # stable canonical dir on top of the data-beta mount so the beta
      # backend serves the same mechanics pages as stable.
      - ./data/mechanics_pages:/data/mechanics_pages:ro
      - ./.secrets:/secrets:ro
    environment:
      - DATA_DIR=/data
      - FEEDBACK_WEBHOOK_URL=${FEEDBACK_WEBHOOK_URL:-}
      - GUIDE_WEBHOOK_URL=${GUIDE_WEBHOOK_URL:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - UNINSTALL_FROM=${UNINSTALL_FROM:-}
      - UNINSTALL_FEEDBACK_TO=${UNINSTALL_FEEDBACK_TO:-}
      - DISABLE_RUN_SUBMISSIONS=1
      - SENTRY_DSN=${SENTRY_DSN:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:-}
      - GITHUB_APP_REPO=${GITHUB_APP_REPO:-}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/secrets/knowledge-demon.private-key.pem}
      # User accounts (Steam/Discord OAuth + JWT sessions). Values live
      # in the host .env; passed through so the auth endpoints work.
      # NOTE: sign-in also needs MONGO_URL (the user store lives in
      # Mongo). Left off here on purpose so beta keeps its read-only
      # data-beta backend — add MONGO_URL if beta accounts are wanted.
      - JWT_SECRET=${JWT_SECRET:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-https://beta.spire-codex.com}
      - SPIRE_CODEX_PUBLIC_BASE=${SPIRE_CODEX_PUBLIC_BASE:-https://beta.spire-codex.com}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      # Redis cache (services.cache). Optional -- the cache is a perf
      # layer and never load-bearing; if unset, every call falls through
      # to its data source unchanged.
      - REDIS_URL=${REDIS_URL:-redis://spire-codex-beta-redis:6379/0}
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: spire-codex-beta-redis
    command:
      - redis-server
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "no"
      - --save
      - ""
    volumes:
      - redis-data:/data
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  frontend:
    image: ptrlrd/spire-codex-frontend:beta
    container_name: spire-codex-beta-frontend
    depends_on:
      - backend
    volumes:
      - ./data-beta:/data:ro
    environment:
      - API_INTERNAL_URL=http://spire-codex-beta-backend:8000
      - NEXT_PUBLIC_SITE_URL=https://beta.spire-codex.com
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  nginx_web-network:
    external: true

volumes:
  redis-data:
